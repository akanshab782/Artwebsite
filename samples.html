<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Samples</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0d0d0d;
      font-family: 'Georgia', serif;
      color: #f5efe6;
      padding: 60px 40px;
    }

    h1 {
      text-align: center;
      color: #c9a84c;
      font-size: 2.5rem;
      font-style: italic;
      margin-bottom: 60px;
    }

    /* ── MAIN GRID ── */
    .grid {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .card {
      background: #1c1c1c;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s;
    }

    .card:hover { transform: scale(1.02); }

    .card-emoji { font-size: 3.5rem; }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,13,13,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      padding: 20px;
      text-align: center;
    }

    .card:hover .card-overlay { opacity: 1; }

    .card-name {
      font-size: 1.2rem;
      font-style: italic;
      color: #e2c97e;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 12px;
    }

    .view-btn {
      padding: 8px 20px;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: transparent;
      cursor: pointer;
      transition: all 0.3s;
    }

    .view-btn:hover {
      background: #c9a84c;
      color: #0d0d0d;
    }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .modal-bg.open { display: flex; }

    .modal {
      background: #141414;
      border: 1px solid rgba(201,168,76,0.2);
      width: 100%;
      max-width: 900px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 40px;
      position: relative;
      animation: fadeUp 0.3s ease;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: #c9a84c;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .modal-title {
      font-size: 1.8rem;
      font-style: italic;
      color: #c9a84c;
      margin-bottom: 8px;
    }

    .modal-subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 36px;
    }

    /* ── PHOTO GRID INSIDE MODAL ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .photo-card {
      background: #1c1c1c;
      border: 1px solid rgba(201,168,76,0.1);
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .photo-card:hover {
      border-color: rgba(201,168,76,0.5);
    }

    .photo-box {
      width: 100%;
      aspect-ratio: 1;
      background: #252525;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      overflow: hidden;
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-info {
      padding: 14px;
    }

    .photo-name {
      font-size: 0.85rem;
      color: #e2c97e;
      margin-bottom: 4px;
    }

    .photo-desc {
      font-size: 0.72rem;
      color: #777;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .photo-price {
      font-size: 0.9rem;
      color: #c9a84c;
      font-weight: bold;
    }

    /* ── NAV ── */
    .nav-row {
      max-width: 1000px;
      margin: 40px auto 0;
      display: flex;
      justify-content: space-between;
    }

    .btn {
      padding: 12px 32px;
      border: 1px solid rgba(201,168,76,0.4);
      background: transparent;
      color: #c9a84c;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
    }

    .btn:hover {
      background: #c9a84c;
      color: #0d0d0d;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #c9a84c; }
  </style>
</head>
<body>

  <h1>Artwork Samples</h1>

  <!-- ── MAIN CATEGORY GRID ── -->
  <div class="grid">

        <p class="card-name">Mixed Art</p>

  </div>

  <div class="nav-row">
    <a href="/products" class="btn">← Back</a>
    <a href="/feedback" class="btn">Leave Feedback →</a>
  </div>

  <!-- ── MODAL POPUP ── -->
  <div class="modal-bg" id="modalBg" onclick="closeModalBg(event)">
    <div class="modal" id="modalBox">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2 class="modal-title" id="modalTitle"></h2>
      <p class="modal-subtitle" id="modalSubtitle"></p>
      <div class="photo-grid" id="photoGrid"></div>
    </div>
  </div>

  <script>

      canvas: {

        items: [
          { emoji: "🌅", name: "Sunset Painting", desc: "Warm sunset over the ocean. A4 size.", price: "₹599" },

          { emoji: "🌷", name: "Pastel Bouquet", desc: "Soft pastel colored mixed flowers.", price: "₹379" },
        ]
      },
      mixed: {
        title: "Mixed Art & Gifts",

          { emoji: "🖼️", name: "Photo Frame", desc: "Resin decorated photo frame. Custom.", price: "₹399" },
          { emoji: "🕯️", name: "Decorated Candle", desc: "Hand decorated scented candle.", price: "₹299" },
          { emoji: "📿", name: "Charm Bracelet", desc: "Handmade resin charm bracelet.", price: "₹249" },
          { emoji: "🌸", name: "Pressed Flower Card", desc: "Real flowers pressed in greeting card.", price: "₹149" },
          { emoji: "✨", name: "Custom Name Art", desc: "Your name in decorative art style.", price: "₹349" },
        ]
      }
    };

    function openModal(category) {
      const d = data[category];
      document.getElementById('modalTitle').textContent = d.title;
      document.getElementById('modalSubtitle').textContent = d.subtitle;

      const grid = document.getElementById('photoGrid');
      grid.innerHTML = '';

      d.items.forEach(item => {
        grid.innerHTML += `
          <div class="photo-card">
            <div class="photo-box">
              ${item.image
                ? `<img src="${item.image}" alt="${item.name}">`
                : item.emoji}
            </div>
            <div class="photo-info">
              <p class="photo-name">${item.name}</p>
              <p class="photo-desc">${item.desc}</p>
              <p class="photo-price">${item.price}</p>
            </div>
          </div>`;
      });

      document.getElementById('modalBg').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalBg').classList.remove('open');
    }

    function closeModalBg(e) {
      if (e.target === document.getElementById('modalBg')) closeModal();
    }
  </script>

</body>
</html>
