<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to My World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Georgia', serif;
    }

    .container {
      text-align: center;
      color: white;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      color: #e2b96f;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 40px;
      color: #ccc;
    }

    .btn {
      padding: 15px 40px;
      font-size: 1.1rem;
      background-color: #e2b96f;
      color: #1a1a2e;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: white;
      color: #1a1a2e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to My World 🎨</h1>
    <p>Explore handcrafted art, keychains & floral designs</p>
    <a href="/products" class="btn">Let's Explore →</a>
  </div>
</body>
</html>
